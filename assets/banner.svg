<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="Gravity Forms Smart Spam Cleaner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111c34"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="20" fill="url(#glow)"/>

  <!-- broom / sweep motif -->
  <g transform="translate(980,70)" opacity="0.95">
    <g transform="rotate(35 90 90)">
      <rect x="84" y="-6" width="12" height="150" rx="6" fill="#94a3b8"/>
      <rect x="60" y="140" width="60" height="26" rx="8" fill="#38bdf8"/>
      <path d="M52 166 L128 166 L150 250 L30 250 Z" fill="#22d3ee" opacity="0.85"/>
      <g stroke="#0f172a" stroke-width="4" opacity="0.55">
        <line x1="60" y1="170" x2="44" y2="248"/>
        <line x1="78" y1="170" x2="70" y2="248"/>
        <line x1="96" y1="170" x2="96" y2="248"/>
        <line x1="114" y1="170" x2="122" y2="248"/>
        <line x1="132" y1="170" x2="146" y2="248"/>
      </g>
    </g>
    <!-- swept-away spam specks -->
    <g fill="#f472b6">
      <circle cx="10" cy="60" r="6"/>
      <circle cx="-30" cy="120" r="4"/>
      <circle cx="40" cy="20" r="4"/>
      <circle cx="-60" cy="70" r="5"/>
    </g>
  </g>

  <!-- title -->
  <text x="80" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" fill="#f8fafc">Smart Spam Cleaner</text>
  <text x="80" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="url(#accent)" letter-spacing="6" transform="translate(0,-78)">FOR GRAVITY FORMS</text>

  <!-- tagline -->
  <text x="82" y="205" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Set-and-forget spam removal — with a safety net.</text>

  <!-- feature pills -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <g transform="translate(82,240)">
      <rect width="196" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
      <text x="98" y="26" text-anchor="middle" fill="#e2e8f0">🛟 Recoverable</text>
    </g>
    <g transform="translate(294,240)">
      <rect width="176" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
      <text x="88" y="26" text-anchor="middle" fill="#e2e8f0">⏰ Automated</text>
    </g>
    <g transform="translate(486,240)">
      <rect width="182" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
      <text x="91" y="26" text-anchor="middle" fill="#e2e8f0">🧠 Self-learning</text>
    </g>
    <g transform="translate(684,240)">
      <rect width="168" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
      <text x="84" y="26" text-anchor="middle" fill="#e2e8f0">🚪 Blocks spam</text>
    </g>
  </g>
</svg>
